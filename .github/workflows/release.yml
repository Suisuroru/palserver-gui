name: release

# 推一個 v* tag(或手動觸發)就會在三種 OS 上各自產生免安裝執行檔,
# 打包成 zip 並附到 GitHub Release。Windows/Linux exe 只能在對應的 runner
# 上產生,這正是需要 CI 的原因(開發者的 Mac 產不出 Windows exe)。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
          - os: macos-latest
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # 合一版(exe + 前端):esbuild bundle → Node SEA → release/
      - run: pnpm release:exe

      # LICENSE.md 一定要跟著散布:PolyForm Noncommercial 的 Notices 條款要求
      # 拿到副本的人也拿得到條款(build-sea.mjs 已把它放進 release/)。
      - name: 打包 zip(合一版,Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cd release && zip -r ../palserver-agent-${{ matrix.artifact }}.zip palserver-agent web LICENSE.md

      - name: 打包 zip(合一版,Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path release/palserver-agent.exe, release/web, release/LICENSE.md -DestinationPath palserver-agent-${{ matrix.artifact }}.zip

      # zip 是給人手動下載的;自我更新讀這包 tar.gz(tar 在 Win10+/mac/Linux 都內建,
      # 且能保留執行權限與 macOS 的 ad-hoc 簽章)。
      - name: 打包 tar.gz(自我更新用)
        shell: bash
        run: tar -czf palserver-agent-${{ matrix.artifact }}.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: palserver-agent-${{ matrix.artifact }}
          path: |
            palserver-agent-${{ matrix.artifact }}.zip
            palserver-agent-${{ matrix.artifact }}.tar.gz

      # 純 web 版(可獨立部署到公開站)—— 只需產一次
      - name: 打包純 web 版
        if: matrix.artifact == 'linux'
        shell: bash
        run: cp LICENSE.md packages/web/dist/ && cd packages/web/dist && zip -r ../../../palserver-web.zip .

      - uses: actions/upload-artifact@v4
        if: matrix.artifact == 'linux'
        with:
          name: palserver-web
          path: palserver-web.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 攤平成一層,並附上校驗檔 —— agent 自我更新前一定會比對 SHA256,
      # 沒有這個檔就拒絕更新(見 packages/agent/src/self-update.ts)。
      - name: 收集產物並產生 SHA256SUMS.txt
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec mv {} dist/ \;
          cd dist && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          # 新手友善的下載指引 —— generate_release_notes 產生的變更紀錄會接在這段後面。
          body: |
            ## 下載哪一個?

            大部分人只要看你電腦對應的那一列就好。解壓縮後**雙擊 `palserver-agent`**,
            瀏覽器會自動打開管理介面,不用先裝 Node、不用 Docker、不用打指令。

            | 你的電腦 | 下載這個 | 說明 |
            | --- | --- | --- |
            | **Windows** | **`palserver-agent-windows.zip`** | 最多人用,雙擊即可 |
            | **Linux** | `palserver-agent-linux.zip` | 同上 |
            | **macOS** | `palserver-agent-macos.zip` | Mac 不能實際開帕魯伺服器(限制),只能拿來管理別台遠端主機 |

            > 這三個都是「合一版」:免安裝執行檔 **+** 網頁介面,一個檔案搞定,適合自己開服。

            <details>
            <summary>其他檔案是什麼?(進階,新手可以直接略過)</summary>

            - **`palserver-web.zip`** — 只有「網頁介面」、不含 agent。要把管理網頁自己架到公開網站(例如 Zeabur)給大家線上用時才需要。
            - **`*.tar.gz`** — 內容和對應的 `.zip` 一樣,但這是給 agent「一鍵自我更新」讀的格式。**手動下載請用 `.zip`。**
            - **`SHA256SUMS.txt`** — 檔案校驗碼,自我更新時會自動比對防止下載損毀,一般玩家可以忽略。
            </details>

            ---

            首次安裝會下載較大的帕魯伺服器檔案、需要一點時間,屬正常現象。
            安裝與連線教學見 [玩家版指南](https://github.com/io-software-ai/palserver-gui/blob/main/docs/INSTALL.zh-TW.md);有問題歡迎到 [Discord](https://discord.gg/sgMMdUZd3V) 找我們。

            > 免費開源,僅限非商業使用(PolyForm Noncommercial)。
